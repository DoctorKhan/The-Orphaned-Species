    type: "chapter"
  - file: "part_2_intro.md"
    title: "Part II: The Hidden History - How We Got Here"
    type: "part"
  - file: "04_the_binary_language_of_control.md"
    title: "Chapter 4: The Binary Language of Control - How Consciousness Was Hijacked"
    type: "chapter"
  - file: "05_myth_as_memory.md"
    title: "Chapter 5: Myth as Memory & The Bronze Age Conflict"
    type: "chapter"
  - file: "06_rediscovering_ancient_technologies.md"
